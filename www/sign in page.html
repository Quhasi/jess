<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy App - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #f9f0ff 0%, #e6f7ff 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wave { position: fixed; top: 0; left: 0; width: 100%; height: 50vh; z-index: -1; }
        .wave path { fill: #fd5ae2; }
        .login-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); overflow: hidden; padding: 40px 35px; position: relative; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #8a2be2; font-size: 2.5rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo h1 i { color: #fd5ae2; }
        .logo p { color: #666; font-size: 1rem; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .input-group input { width: 100%; padding: 12px 20px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; outline: none; transition: all 0.3s; background: #fafafa; }
        .input-group input:focus { border-color: #8a2be2; background: white; }
        button[type="submit"] { width: 100%; padding: 16px; background: linear-gradient(135deg, #8a2be2 0%, #fd5ae2 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button[type="submit"]:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(138, 43, 226, 0.3); }
        .signup-text { text-align: center; margin-top: 25px; color: #666; font-size: 0.95rem; padding-top: 20px; border-top: 1px solid #eee; }
        .signup-text a { color: #8a2be2; text-decoration: none; font-weight: 600; }
        .alert-message { padding: 15px 20px; border-radius: 10px; margin-bottom: 25px; display: none; align-items: center; gap: 12px; font-size: 0.95rem; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <svg class="wave" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path d="M0,256L48,229.3C96,203,192,149,288,122.7C384,96,480,96,576,117.3C672,139,768,181,864,192C960,203,1056,181,1152,170.7C1248,160,1344,160,1392,160L1440,160L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
    </svg>
    
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-baby"></i> Create Account</h1>
            <p>Start your pregnancy journey with us</p>
        </div>
        
        <div id="alertMessage" class="alert-message">
            <i class="fas fa-info-circle"></i> <span id="alertText"></span>
        </div>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>

            <div class="input-group">
                <label for="dueDate"><i class="fas fa-calendar-alt"></i> Estimated Due Date</label>
                <input type="date" id="dueDate" name="dueDate" required>
            </div>
            
            <button type="submit" id="signupButton">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </form>
        
        <p class="signup-text">
            Already have an Account? <a href="Login.html">Log in</a>
        </p>
    </div>

    <script>
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            if (alert && alertText) {
                alertText.textContent = message;
                alert.className = `alert-message alert-${type}`;
                alert.style.display = 'flex';
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const dueDate = document.getElementById('dueDate').value;
            const signupButton = document.getElementById('signupButton');

            try {
                signupButton.disabled = true;
                signupButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, dueDate })
                });

                const data = await response.json();

                if (response.ok) {
                    // STORE THE ID IMMEDIATELY SO PROFILE WORKS
                    const idToSave = data.userId || data.id;
                    if (idToSave) {
                        localStorage.setItem('userId', idToSave);
                        localStorage.setItem('currentUser', JSON.stringify(data));
                    }

                    showAlert('Account created! Redirecting to login...', 'success');
                    setTimeout(() => { 
                        window.location.href = 'Login.html?signup=success'; 
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed', 'error');
                    signupButton.disabled = false;
                    signupButton.innerHTML = '<i class="fas fa-user-plus"></i> Sign Up';
                }
            } catch (error) {
                console.error("Signup error:", error);
                showAlert('Server error. Is your Node.js app running?', 'error');
                signupButton.disabled = false;
                signupButton.innerHTML = '<i class="fas fa-user-plus"></i> Sign Up';
            }
        }

        document.getElementById('signupForm').addEventListener('submit', handleSignup);
    </script>
</body>
</html>
