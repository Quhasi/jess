<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy App - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #f9f0ff 0%, #e6f7ff 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wave { position: fixed; top: 0; left: 0; width: 100%; height: 50vh; z-index: -1; }
        .wave path { fill: #fd5ae2; }
        .login-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); overflow: hidden; padding: 40px 35px; position: relative; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #8a2be2; font-size: 2.5rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo h1 i { color: #fd5ae2; }
        .logo p { color: #666; font-size: 1rem; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .input-group input { width: 100%; padding: 15px 20px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; outline: none; transition: all 0.3s; background: #fafafa; }
        .input-group input:focus { border-color: #8a2be2; background: white; box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1); }
        button[type="submit"] { width: 100%; padding: 16px; background: linear-gradient(135deg, #8a2be2 0%, #fd5ae2 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        button[type="submit"]:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(138, 43, 226, 0.3); }
        .signup-text { text-align: center; margin-top: 25px; color: #666; font-size: 0.95rem; padding-top: 20px; border-top: 1px solid #eee; }
        .signup-text a { color: #8a2be2; text-decoration: none; font-weight: 600; }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .remember-me { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #555; }
        .forgot-password { color: #8a2be2; text-decoration: none; font-size: 0.9rem; }
        .alert-message { padding: 15px 20px; border-radius: 10px; margin-bottom: 25px; display: none; align-items: center; gap: 12px; font-size: 0.95rem; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .password-toggle { position: absolute; right: 15px; top: 40px; background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <svg class="wave" viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path d="M0,256L48,229.3C96,203,192,149,288,122.7C384,96,480,96,576,117.3C672,139,768,181,864,192C960,203,1056,181,1152,170.7C1248,160,1344,160,1392,160L1440,160L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
    </svg>
    
    <div class="login-container">
        <div class="logo">
            <h1><i class="fas fa-baby"></i> Pregnancy App</h1>
            <p>Your personal pregnancy companion</p>
        </div>
        
        <div id="alertMessage" class="alert-message">
            <i class="fas fa-info-circle"></i> <span id="alertText"></span>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username"><i class="fas fa-user-circle"></i> Email Address</label>
                <input type="email" id="username" name="username" required placeholder="Enter your email">
            </div>
            
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
                <button type="button" class="password-toggle" id="togglePassword">
                    <i class="far fa-eye"></i>
                </button>
            </div>
            
            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" id="loginButton">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <p class="signup-text">
            Don't have an Account? <a href="sign in page.html">Sign up</a>
        </p>
    </div>

    <script>
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            if (alert && alertText) {
                alertText.textContent = message;
                alert.className = `alert-message alert-${type}`;
                alert.style.display = 'flex';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');

            try {
                loginButton.disabled = true;
                loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // This stores the ID so the profile page works properly
                    localStorage.setItem('currentUser', JSON.stringify(data));
                    const idToSave = data.userId || data.id;
                    if (idToSave) {
                        localStorage.setItem('userId', idToSave);
                    }
                    
                    showAlert(`Login successful.`, 'success');
                    setTimeout(() => {
                        window.location.href = 'new home.html';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Invalid credentials', 'error');
                    loginButton.disabled = false;
                    loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                showAlert('Server error. Ensure your backend is running.', 'error');
                loginButton.disabled = false;
                loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'far fa-eye';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
